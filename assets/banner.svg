      <rect x="134" width="154" height="40" rx="20" fill="#5cf2bd" fill-opacity=".1" stroke="#5cf2bd" stroke-opacity=".42"/><text x="211" y="26" fill="#c3ffeb" font-size="13" text-anchor="middle" font-weight="750">DETERMINISTIC</text>
      <rect x="302" width="177" height="40" rx="20" fill="#5cf2bd" fill-opacity=".1" stroke="#5cf2bd" stroke-opacity=".42"/><text x="390" y="26" fill="#c3ffeb" font-size="13" text-anchor="middle" font-weight="750">0 DEPENDENCIES</text>
